# In-memory DB for unit smoke test (full integration still uses PostgreSQL in application.properties).
spring.datasource.url=jdbc:h2:mem:aims_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS aims;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=aims
