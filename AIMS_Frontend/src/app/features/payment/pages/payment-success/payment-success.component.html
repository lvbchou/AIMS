<div class="success-page">
  <div class="success-content">

    <!-- Check icon -->
    <div class="success-icon" aria-hidden="true">
      <span class="material-icons">check_circle</span>
    </div>

    <h1 class="success-title">Payment Successful</h1>

    <p class="success-desc">
      Thank you for your purchase. Your order has been confirmed and is
      being processed by our curation team.
    </p>

    <!-- Order name box — always visible -->
    <div class="order-ref">
      <span class="order-ref__label">ORDER REFERENCE</span>
      <span class="order-ref__value">{{ orderReference }}</span>
    </div>

    <!-- Back to shop link -->
    <button class="back-link" (click)="backToShop()">
      Back to Shop &nbsp;&rarr;
    </button>

  </div>
</div>
