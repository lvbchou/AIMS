<!-- state$ chỉ bọc phần list, không bọc modal -->
<ng-container *ngIf="catalog.state$ | async as state">
  <div class="page">
    <div class="page-header">
      <h2>{{ catalog.pageTitle }}</h2>
      <span class="total-count">{{ state.totalElements }} products</span>
    </div>

    <app-product-filter
      *ngIf="catalog.showFilter"
      [activeFilter]="state.activeFilter"
      (filterApplied)="onFilterApplied($event)"
    />

    <app-product-list
      [products]="state.products"
      [isLoading]="state.isLoading"
      [skeletonCount]="10"
      [mode]="'customer'"
      (onViewDetail)="onViewDetail($event)"
      (onAddToCart)="onAddToCart($event)"
    />

    <app-pagination
      [currentPage]="state.currentPage"
      [totalPages]="state.totalPages"
      (onPage)="goToPage($event)"
    />
  </div>
</ng-container>

<!-- modal nằm ngoài ng-container — không bị ảnh hưởng khi state$ emit -->
<app-product-detail-modal
  *ngIf="viewProductDetail$ | async as detail"
  [product]="detail"
  (close)="closeModal()"
/>

<app-toast />
