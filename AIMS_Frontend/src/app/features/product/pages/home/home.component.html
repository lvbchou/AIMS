<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title">AIMS STORE</h1>
    <p class="hero-sub">Vietnam's leading automated warehouse management system.
      Experience professionalism and modernity in every product.</p>
    <button class="btn-shop" (click)="viewAll()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" stroke-width="2"/>
        <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/>
        <path d="M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="2"/>
      </svg>
      Shop Now
    </button>
  </div>
  <div class="hero-logo-wrap">
    <div class="hero-logo">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" fill="#cc0000"/>
        <polyline points="9 22 9 12 15 12 15 22" fill="#fff" stroke="#fff" stroke-width="1"/>
      </svg>
    </div>
  </div>
</section>

<section class="arrivals">
  <div class="arrivals-inner">
    <h2 class="section-title">New Arrivals</h2>
    <app-product-list
      [products]="products"
      [isLoading]="isLoading"
      [skeletonCount]="10"
      [mode]="'customer'"
      (onViewDetail)="onViewDetail($event)"
      (onAddToCart)="onAddToCart($event)"
    ></app-product-list>
    <div class="view-all-wrap">
      <button class="btn-view-all" (click)="viewAll()">VIEW ALL PRODUCTS</button>
    </div>
  </div>
</section>

<app-product-detail-modal
  *ngIf="viewProductDetail !== null"
  [product]="viewProductDetail"
  (close)="closeModal()">
</app-product-detail-modal>
<app-toast />
