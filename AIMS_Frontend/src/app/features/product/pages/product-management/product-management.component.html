<div class="page">

  <div class="page-header">
    <div class="page-title">
      <h2>Products</h2>
      <span class="total-count">
        Total: {{ listFacade.totalElements$ | async }} products
      </span>
    </div>

    <div class="page-actions">
      <ng-container *ngIf="!(selection.selectionMode$ | async)">
        <button class="btn btn-danger" (click)="enterSelectionMode()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <polyline points="3,6 5,6 21,6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
          Delete
        </button>
        <button class="btn btn-success" (click)="onAdd()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Product
        </button>
      </ng-container>

      <ng-container *ngIf="selection.selectionMode$ | async">
        <button
          class="btn btn-danger"
          (click)="deleteSelected()"
          [disabled]="(selection.selectedCount$ | async) === 0"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <polyline points="3,6 5,6 21,6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          </svg>
          Delete ({{ selection.selectedCount$ | async }})
        </button>
        <button class="btn btn-secondary" (click)="cancelSelection()">
          Cancel
        </button>
      </ng-container>
    </div>
  </div>

  <app-product-list
    [products]="(listFacade.products$ | async) ?? []"
    [isLoading]="(listFacade.isLoading$ | async) ?? false"
    [skeletonCount]="10"
    [mode]="'manager'"
    [selectedIds]="(selection.selectedIds$ | async) ?? emptySet"
    [selectionMode]="(selection.selectionMode$ | async) ?? false"
    [isMaxSelected]="(selection.isMaxSelected$ | async) ?? false"
    (toggleSelect)="onToggle($event)"
    (onUpdate)="onUpdate($event)"
    (onDelete)="onDelete($event)"
    (onViewDetail)="onViewDetail($event)"
  />

  <app-pagination
    [currentPage]="(listFacade.currentPage$ | async) ?? 0"
    [totalPages]="(listFacade.totalPages$ | async) ?? 0"
    (onPage)="goToPage($event)"
  />

</div>

<app-product-form
  *ngIf="showProductForm$ | async"
  [product]="(selectedProduct$ | async)"
  (submitted)="onFormSubmitted($event)"
  (cancelled)="onCreateCancelled()"
/>

<app-manager-product-view-modal
  *ngIf="viewDetailProduct$ | async"
  [product]="(viewDetailProduct$ | async)!"
  (close)="closeViewDetail()"
/>

<app-confirm-dialog />
<app-toast />
