<div class="page">

  <div class="page-header">
    <div class="page-title">
      <h2>Products</h2>
      <span class="total-count">Total: {{ products.length }} products</span>
    </div>

    <div class="page-actions">
      <!-- khi chưa vào selection mode -->
      <ng-container *ngIf="!selectionMode">
        <button class="btn btn-danger" (click)="enterSelectionMode()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <polyline points="3,6 5,6 21,6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
          Delete
        </button>
        <button class="btn btn-success" (click)="onAdd()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Product
        </button>
      </ng-container>

      <!-- khi đang trong selection mode -->
      <ng-container *ngIf="selectionMode">
        <button
          class="btn btn-danger"
          (click)="deleteSelected()"
          [disabled]="selectedIds.size === 0"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <polyline points="3,6 5,6 21,6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          </svg>
          Delete ({{ selectedIds.size }})
        </button>
        <button class="btn btn-secondary" (click)="cancelSelection()">
          Cancel
        </button>
      </ng-container>
    </div>
  </div>

  <app-product-list
    [products]="products"
    [isLoading]="isLoading"
    [skeletonCount]="10"
    [selectedIds]="selectedIds"
    [selectionMode]="selectionMode"
    [isMaxSelected]="isMaxSelected"
    (toggleSelect)="onToggle($event)"
    (onUpdate)="onUpdate($event)"
    (onDelete)="onDelete($event)"
    (onViewDetail)="onViewDetail($event)"
  ></app-product-list>

</div>
<app-product-form
  *ngIf="showProductForm"
  [product]="selectedProduct"
  (submitted)="onProductCreated($event)"
  (cancelled)="onCreateCancelled()"
/>

<app-manager-product-view-modal
  *ngIf="viewDetailProduct !== null"
  [product]="viewDetailProduct!"
  (close)="closeViewDetail()"
/>

<app-confirm-dialog />
<app-toast />
