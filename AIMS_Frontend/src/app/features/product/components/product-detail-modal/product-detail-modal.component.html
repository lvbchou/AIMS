<div class="modal-backdrop" (click)="onClose()"></div>

<div class="modal">
  <button class="btn-close" (click)="onClose()">✕</button>

  <div class="modal-body">
    <app-product-detail-panel [product]="product">

      <!-- Slot price: customer chỉ thấy selling price -->
      <div slot="price" class="price-bar">
        <span class="price">{{ fmt(product.sellingPrice) }}</span>
      </div>

      <!-- Slot action: cart control -->
      <div slot="action" class="cart-bar">
        <div class="qty-ctrl">
          <button (click)="decrement()">−</button>
          <span>{{ quantity }}</span>
          <button (click)="increment()">+</button>
        </div>
        <button class="btn-add-cart" (click)="onAddToCart()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" stroke-width="2"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="2"/>
          </svg>
          Add to Cart
        </button>
      </div>

    </app-product-detail-panel>
  </div>
</div>
