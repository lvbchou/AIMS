<section class="category-section" [formGroup]="form">
  <h3 class="category-title">Category Details — DVD</h3>

  <div class="form-grid">

    <div class="form-field">
      <label>Disc Type <span class="required">*</span></label>
      <input type="text" formControlName="discType"
        [class.invalid]="form.get('discType')?.invalid && form.get('discType')?.touched" />
      <span class="error-msg"
        *ngIf="form.get('discType')?.invalid && form.get('discType')?.touched">
        Disc type is required
      </span>
    </div>

    <div class="form-field">
      <label>Director <span class="required">*</span></label>
      <input type="text" formControlName="director"
        [class.invalid]="form.get('director')?.invalid && form.get('director')?.touched" />
      <span class="error-msg"
        *ngIf="form.get('director')?.invalid && form.get('director')?.touched">
        Director is required
      </span>
    </div>

    <div class="form-field">
      <label>Runtime (min) <span class="required">*</span></label>
      <input type="number" formControlName="runtime"
        [class.invalid]="form.get('runtime')?.invalid && form.get('runtime')?.touched" />
      <span class="error-msg"
        *ngIf="form.get('runtime')?.invalid && form.get('runtime')?.touched">
        Runtime is required
      </span>
    </div>

    <div class="form-field">
      <label>Studio <span class="required">*</span></label>
      <input type="text" formControlName="studio"
        [class.invalid]="form.get('studio')?.invalid && form.get('studio')?.touched" />
      <span class="error-msg"
        *ngIf="form.get('studio')?.invalid && form.get('studio')?.touched">
        Studio is required
      </span>
    </div>

    <div class="form-field">
      <label>Language <span class="required">*</span></label>
      <input type="text" formControlName="language"
        [class.invalid]="form.get('language')?.invalid && form.get('language')?.touched" />
      <span class="error-msg"
        *ngIf="form.get('language')?.invalid && form.get('language')?.touched">
        Language is required
      </span>
    </div>

    <div class="form-field">
      <label>Subtitles <span class="required">*</span></label>
      <input type="text" formControlName="subtitles"
        [class.invalid]="form.get('subtitles')?.invalid && form.get('subtitles')?.touched" />
      <span class="error-msg"
        *ngIf="form.get('subtitles')?.invalid && form.get('subtitles')?.touched">
        Subtitles is required
      </span>
    </div>

    <div class="form-field">
      <label>Genre</label>
      <input type="text" formControlName="genre" />
    </div>

    <div class="form-field">
      <label>Release Date</label>
      <input type="date" formControlName="releaseDate" />
    </div>

  </div>
</section>
