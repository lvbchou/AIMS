<!-- Skeleton khi đang loading -->
<div class="grid" *ngIf="isLoading">
  <div
    *ngFor="let i of skeletonItems"
    class="skeleton-card"
  ></div>
</div>

<!-- Danh sách thật khi đã load xong -->
<div class="grid" *ngIf="!isLoading">
  <app-product-card
    *ngFor="let p of products"
    [product]="p"
    [selected]="isSelected(p.productId)"
    [selectionMode]="selectionMode"
    [isMaxSelected]="isMaxSelected"
    (toggleSelect)="onToggle($event)"
    (update)="onUpdate.emit($event)"
    (delete)="onDelete.emit($event)"
    (viewDetail)="onViewDetail.emit($event)"
  ></app-product-card>
</div>
