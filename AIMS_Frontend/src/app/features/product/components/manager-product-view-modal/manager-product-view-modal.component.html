<div class="modal-backdrop" (click)="onClose()"></div>

<div class="modal" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
  <button class="btn-close" (click)="onClose()" aria-label="Close">✕</button>

  <div class="modal-body">
    <app-product-detail-panel [product]="product">

      <!-- Slot price: manager thấy original trên, selling dưới — cùng màu đỏ -->
      <div slot="price" class="price-section">
        <div class="price-row" *ngIf="product.originalValue">
          <span class="price-label">Original Value:</span>
          <span class="original-price">{{ fmt(product.originalValue) }}</span>
        </div>
        <div class="price-row">
          <span class="price-label">Selling Price:</span>
          <span class="selling-price">{{ fmt(product.sellingPrice) }}</span>
        </div>
      </div>

    </app-product-detail-panel>
  </div>
</div>
