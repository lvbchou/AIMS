<div class="page">

  <!-- Hero Banner -->
  <div class="hero">
    <h1>Welcome back 👋</h1>
    <p>AIMS Management System — choose a section below to get started.</p>
  </div>

  <!-- Cards -->
  <div class="content">
    <div class="card-grid">

      <div class="card" (click)="navigate('products')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
            <polyline points="3.27,6.96 12,12.01 20.73,6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <h3>Products</h3>
        <p>Manage product catalog</p>
      </div>

      <div class="card" (click)="navigate('stock')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
          </svg>
        </div>
        <h3>Stock</h3>
        <p>Track price & inventory</p>
      </div>

      <div class="card" (click)="navigate('orders')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10,9 9,9 8,9"/>
          </svg>
        </div>
        <h3>Orders</h3>
        <p>View & process orders</p>
      </div>

      <div class="card" (click)="navigate('account')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h3>My Account</h3>
        <p>Profile & password</p>
      </div>

    </div>
  </div>

</div>
