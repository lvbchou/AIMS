<div class="cp-wrapper">
  <div class="cp-card">

    <!-- Header -->
    <div class="logo-section">
      <div class="logo">A</div>
      <h1>Change Password</h1>
      <p>Update your AIMS account password</p>
    </div>

    <!-- Success state -->
    <div class="success-message" *ngIf="success">
      Password changed successfully. Redirecting...
    </div>

    <!-- Form -->
    <form *ngIf="!success" (ngSubmit)="submit()" novalidate autocomplete="off">

      <!-- Current Password -->
      <div class="form-group">
        <label for="cp-current">Current Password</label>
        <input
          id="cp-current"
          type="password"
          placeholder="Enter current password"
          [(ngModel)]="currentPassword"
          name="currentPassword"
          autocomplete="current-password"
          (blur)="touched.current = true"
          [class.input-error]="touched.current && !currentPassword">
        <span class="field-hint" *ngIf="touched.current && !currentPassword">
          Current password is required.
        </span>
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label for="cp-new">New Password</label>
        <input
          id="cp-new"
          type="password"
          placeholder="Min. 8 chars, uppercase, lowercase, digit"
          [(ngModel)]="newPassword"
          name="newPassword"
          autocomplete="new-password"
          (blur)="touched.newPwd = true"
          [class.input-error]="!!newPasswordHint">
        <span class="field-hint" *ngIf="newPasswordHint">{{ newPasswordHint }}</span>
      </div>

      <!-- Confirm New Password -->
      <div class="form-group">
        <label for="cp-confirm">Confirm New Password</label>
        <input
          id="cp-confirm"
          type="password"
          placeholder="Re-enter new password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          autocomplete="new-password"
          (blur)="touched.confirm = true"
          [class.input-error]="!!confirmHint">
        <span class="field-hint" *ngIf="confirmHint">{{ confirmHint }}</span>
      </div>

      <!-- Server error -->
      <div class="error-message" *ngIf="error">{{ error }}</div>

      <!-- Actions -->
      <div class="cp-actions">
        <button
          type="button"
          class="cancel-btn"
          (click)="close()"
          [disabled]="loading">
          Cancel
        </button>
        <button
          type="submit"
          class="submit-btn"
          [disabled]="formInvalid || loading">
          <span *ngIf="!loading">Change Password</span>
          <span *ngIf="loading">Saving...</span>
        </button>
      </div>

    </form>

  </div>
</div>
