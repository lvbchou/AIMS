<div class="page">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h2 class="page-title">Stock</h2>
      <p class="page-subtitle">
        {{ stocks.length }} products - total {{ totalUnits }} units in stock
      </p>
    </div>
  </div>

  <!-- Table -->
  <app-stock-table
    [stocks]="stocks"
    (edit)="onEdit($event)"
    (history)="onHistory($event)"
   />

</div>

<!-- Adjust form popup -->
<app-stock-adjust-form
  *ngIf="showAdjustForm && selectedItem"
  [item]="selectedItem"
  (submitted)="onAdjustSubmitted($event)"
  (cancelled)="onAdjustCancelled()"
/>

<!-- History dialog popup -->
<app-stock-history-dialog
  *ngIf="showHistoryDialog && selectedItem"
  [item]="selectedItem"
  [history]="getHistory(selectedItem.productId)"
  (closed)="onHistoryClosed()"
/>

<!-- Toast -->
<app-toast />
