<div class="backdrop" (click)="onCancel()"></div>

<div class="modal" role="dialog" aria-modal="true">

  <div class="modal-header">
    <div class="header-text">
      <h2 class="modal-title">Adjust Stock</h2>
      <span class="product-name">{{ item.title }}</span>
    </div>
    <button type="button" class="btn-close" (click)="onCancel()">✕</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="modal-form">
    <div class="modal-body">

      <!-- Current quantity -->
      <div class="quantity-display">
        <div class="quantity-box">
          <span class="quantity-label">Current</span>
          <span class="quantity-value">{{ item.quantity }}</span>
        </div>
        <div class="quantity-arrow">→</div>
        <div class="quantity-box" [class.increase]="!isDecrease" [class.decrease]="isDecrease">
          <span class="quantity-label">After</span>
          <span class="quantity-value">{{ previewQuantity }}</span>
        </div>
      </div>

      <div class="form-grid">

        <!-- Adjust type -->
        <div class="form-field full-width">
          <label>Adjust Type <span class="required">*</span></label>
          <select formControlName="adjustType">
            <option *ngFor="let t of adjustTypes" [value]="t.value">
              {{ t.label }}
            </option>
          </select>
        </div>

        <!-- Quantity -->
        <div class="form-field full-width">
          <label>Quantity <span class="required">*</span></label>
          <input
            type="number"
            formControlName="quantity"
            min="1"
            [class.invalid]="form.get('quantity')?.invalid && form.get('quantity')?.touched"
          />
          <span class="error-msg"
            *ngIf="form.get('quantity')?.invalid && form.get('quantity')?.touched">
            Quantity must be at least 1
          </span>
        </div>

        <!-- Reason -->
        <div class="form-field full-width">
          <label>Reason <span class="required">*</span></label>
          <textarea
            formControlName="reason"
            rows="3"
            placeholder="Enter reason for adjustment..."
            [class.invalid]="form.get('reason')?.invalid && form.get('reason')?.touched"
          ></textarea>
          <span class="error-msg"
            *ngIf="form.get('reason')?.invalid && form.get('reason')?.touched">
            Reason is required
          </span>
        </div>

      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-submit">Confirm</button>
    </div>
  </form>

</div>
