<div class="table-wrap">
    <table class="table">
        <thead>
            <tr>
                <th class="col-no">#</th>
                <th class="col-product">Product</th>
                <th class="col-category">Category</th>
                <th class="col-quantity">Quantity</th>
                <th class="col-action">Action</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of stocks; let i = index"
                [class.out-of-stock]="item.quantity === 0">
                <td class="col-no">{{ i + 1 }}</td>
                <td class="col-product">{{ item.title }}</td>
                <td class="col-category">
                    <span class="category-badge" [class]="item.productType.toLowerCase()">
                        {{ item.productType }}
                    </span>
                </td>
                <td class="col-quantity" [class.zero]="item.quantity === 0">
                    {{ item.quantity }}
                </td>
                <td class="col-action">
                    <!-- Edit -->
                    <button class="btn-icon" title="Adjust stock" (click)="onEdit(item)">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                    <!-- History -->
                    <button class="btn-icon" title="View history" (click)="onHistory(item)">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12,6 12,12 16,14"/>
                        </svg>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
