<ng-container *ngIf="config">

  <div class="backdrop" (click)="onCancel()"></div>

  <div class="dialog" role="alertdialog" aria-modal="true">

    <div class="dialog-header">
      <div class="icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
                fill="#FDECEA" stroke="#E53935" stroke-width="1.5"/>
          <line x1="12" y1="9" x2="12" y2="13"
                stroke="#E53935" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="12" cy="17" r="0.8" fill="#E53935"/>
        </svg>
      </div>

      <div class="dialog-text">
        <h3 class="dialog-title">{{ config.title }}</h3>
        <p class="dialog-message">{{ config.message }}</p>
      </div>
    </div>

    <div class="dialog-footer">
      <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button type="button" class="btn-delete" (click)="onConfirm()">Delete</button>
    </div>

  </div>

</ng-container>
